# ═══════════════════════════════════════════════════════════════
# Call Intelligence Engine — إعدادات المشروع
# يُقرأ من: src.utils.config.load_config()
# ═══════════════════════════════════════════════════════════════

project:
  name: "Call Intelligence Engine"
  version: "0.1.0"
  language: "ar"  # العربية الفصحى + اللهجات

# ─── المرحلة 1: البيانات ──────────────────────────────────────────
data:
  # المسارات (نسبية لجذر المشروع)
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  interim_dir: "data/interim"
  train_dir: "data/train"
  val_dir: "data/val"
  test_dir: "data/test"

  # تقسيم البيانات
  splits:
    train: 0.70
    val: 0.15
    test: 0.15
  random_seed: 42  # للتقسيم القابل لإعادة الإنتاج

  # الحد الأدنى المطلوب
  min_total_hours: 10.0
  min_speakers: 4
  min_dialects: 2

  # المصادر العامة
  sources:
    common_voice:
      enabled: true
      dataset: "mozilla-foundation/common_voice_17_0"
      language: "ar"
      splits: ["train", "validation", "test"]
      max_clips: 500       # ابدأ بعدد معقول لتجربة الـ pipeline
      min_duration_sec: 3.0
      max_duration_sec: 30.0
    mgb:
      enabled: false       # MGB يحتاج تسجيلاً مسبقاً وبيانات كبيرة
      note: "للتسجيل: https://www.mgb-challenge.org/"

# ─── المعالجة الصوتية (للمرحلة 2) ──────────────────────────────────
audio:
  target_sample_rate: 16000   # 16kHz معيار ASR
  target_channels: 1          # mono
  target_bit_depth: 16        # 16-bit PCM
  format: "wav"

  quality_thresholds:
    min_snr_db: 10.0          # نسبة إشارة لضوضاء أقل = جودة سيئة
    max_silence_ratio: 0.5    # أكثر من 50% صمت = ملف غير مفيد
    min_rms: 0.001            # أقل من هذا = صامت تقريباً

# ─── التسجيل والمخرجات ──────────────────────────────────────────
logging:
  level: "INFO"
  file: "logs/cie.log"
  rotation: "10 MB"
  retention: "30 days"
